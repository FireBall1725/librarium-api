      tags:
      - media-types
  /setup/admin:
    post:
      consumes:
      - application/json
      description: Creates the initial instance admin on a fresh install. Fails with
        409 once any user exists.
      parameters:
      - description: Admin account request
        in: body
        name: body
        required: true
        schema:
          properties:
            display_name:
              type: string
            email:
              type: string
            password:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              access_token:
                type: string
              expires_in:
                type: integer
              refresh_token:
                type: string
              user:
                type: object
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Create first instance admin
      tags:
      - setup
  /setup/status:
    get:
      description: Returns whether the instance has been initialized (at least one
        user exists).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              initialized:
                type: boolean
            type: object
      summary: Setup status
      tags:
      - setup
  /users:
    get:
      description: Full-text search across users; returns minimal profile data. Query
        must be at least 2 characters.
      parameters:
      - description: Search query (min 2 chars)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              properties:
                display_name:
                  type: string
                email:
                  type: string
                id:
                  type: string
                username:
                  type: string
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Search users
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
