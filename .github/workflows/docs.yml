name: API Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/swagger.json"
      - "docs/swagger.yaml"
      - "docs/scalar.html"
      - ".github/workflows/docs.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Scalar static site
        # Mirrors the runtime Scalar UI in internal/api/handlers/docs.go
        # so the published docs and the in-app reference share one identity.
        run: |
          set -euo pipefail
          mkdir -p site
          cp docs/swagger.json site/openapi.json
          cp docs/swagger.yaml site/openapi.yaml
          cp docs/scalar.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
