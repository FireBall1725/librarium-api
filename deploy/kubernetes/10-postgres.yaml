apiVersion: v1
kind: Service
metadata:
  name: librarium-db
  namespace: librarium
spec:
  clusterIP: None
  selector:
    app: librarium-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: librarium-db
  namespace: librarium
spec:
  serviceName: librarium-db
  replicas: 1
  selector:
    matchLabels:
      app: librarium-db
  template:
    metadata:
      labels:
        app: librarium-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: librarium
            - name: POSTGRES_USER
              value: librarium
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librarium-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "librarium"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "librarium"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        # storageClassName: your-storage-class
