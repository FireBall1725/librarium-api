host: localhost:8080
info:
  contact:
    name: Librarium
    url: https://librarium.press
  description: Backend API for Librarium — a self-hosted, privacy-focused tracker
    for your physical book, manga, and comic collection. All protected endpoints require
    a Bearer JWT (or `lbrm_pat_*` personal access token) in the Authorization header.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  termsOfService: https://librarium.press
  title: Librarium API
  version: 26.4.0
paths:
  /admin/books/{book_id}:
    delete:
      description: |-
        Permanently deletes the books row and cascades through all
        libraries, editions, user interactions, loans, and any other
        references. Use with care.
      parameters:
      - description: Book UUID
        in: path
        name: book_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a book entirely (admin only)
      tags:
      - admin
  /admin/connections/ai:
    get:
      description: Returns provider status, masked config, active flag, and config-field
        schema for each registered AI provider.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AIProviderStatus'
            type: array
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List AI providers (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/{provider}:
    put:
      consumes:
      - application/json
      description: Updates the API key, model, base URL, or enabled flag for the named
        provider. Secrets are merged over existing config so omitted keys are preserved.
      parameters:
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      - description: Provider configuration key-value pairs
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AIProviderStatus'
            type: array
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Configure an AI provider (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/{provider}/test:
    post:
      description: Performs a cheap probe call to verify the provider's API key and
        model.
      parameters:
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              error:
                type: string
              ok:
                type: boolean
              reply:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Test an AI provider (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/active:
    post:
      consumes:
      - application/json
      description: Exactly one AI provider is active at a time. Passing an empty name
        disables AI suggestions.
      parameters:
      - description: Provider name
        in: body
        name: body
        required: true
        schema:
          properties:
            provider:
              type: string
          type: object
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set the active AI provider (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/ollama/models:
    get:
      description: Proxies the configured Ollama host's /api/tags endpoint. Used by
        the provider-config UI to render a model dropdown instead of a free-text input.
        Returns 503 when the host is unreachable so the UI can fall back to the text
        input.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handlers.ollamaModelsResponse'
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
              reachable:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: List locally-pulled Ollama models (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/osaurus/models:
    get:
      description: Proxies the configured Osaurus host's /v1/models endpoint (OpenAI
        shape). Used by the provider-config UI to render a model dropdown instead
        of a free-text input. Returns 503 when the host is unreachable so the UI can
        fall back to the text input.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handlers.osaurusModelsResponse'
        "503":
          description: Service Unavailable
          schema:
            properties:
              error:
                type: string
              reachable:
                type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: List models available on the configured Osaurus host (admin)
      tags:
      - admin
      - ai
  /admin/connections/ai/permissions:
    get:
      description: Returns the deployment-wide data categories the AI may access.
        Combined restrictive-wins with each user's opt-in.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AIPermissions'
      security:
      - BearerAuth: []
      summary: Get AI data-access permissions (admin)
      tags:
      - admin
      - ai
    put:
      consumes:
      - application/json
      description: Replaces the deployment-wide data-access policy. All fields must
        be provided; omitted fields default to false.
      parameters:
      - description: Permissions object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AIPermissions'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AIPermissions'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update AI data-access permissions (admin)
      tags:
      - admin
      - ai
  /admin/jobs:
    get:
      description: Returns a summary of every admin-configurable scheduled job.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.JobSummary'
            type: array
      security:
      - BearerAuth: []
      summary: List configurable jobs (admin)
      tags:
      - admin
      - jobs
  /admin/jobs/{id}:
    delete:
      parameters:
      - description: job id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete a job entirely
      tags:
      - admin
      - jobs
    get:
      parameters:
      - description: job id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              events:
                type: array
              job:
                $ref: '#/definitions/internal_api_handlers.JobView'
            type: object
      security:
      - BearerAuth: []
      summary: Get unified job detail with event log
      tags:
      - admin
      - jobs
  /admin/jobs/ai-suggestions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AISuggestionsJobConfig'
      security:
      - BearerAuth: []
      summary: Get AI suggestions job config (admin)
      tags:
      - admin
      - jobs
    put:
      consumes:
      - application/json
      parameters:
      - description: Job config
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AISuggestionsJobConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.AISuggestionsJobConfig'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update AI suggestions job config (admin)
      tags:
      - admin
      - jobs
  /admin/jobs/ai-suggestions/run:
    post:
      description: Enqueues a job per opted-in user.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            properties:
              enqueued:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Trigger a suggestions run for every opted-in user (admin)
      tags:
      - admin
      - jobs
  /admin/jobs/ai-suggestions/runs:
    delete:
      description: Removes every run in a terminal state (completed, failed, cancelled).
        Running runs are left alone.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              deleted:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Delete all finished AI suggestion runs (admin)
      tags:
      - admin
      - jobs
    get:
      description: Returns the most recent suggestion runs with cost, status, and
        owning user. Used by the admin jobs page.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handlers.RunView'
            type: array
      security:
      - BearerAuth: []
      summary: List recent AI suggestion runs across all users (admin)
      tags:
      - admin
      - jobs
  /admin/jobs/ai-suggestions/runs/{id}:
    delete:
      description: Marks a running run as cancelled; the worker checks status between
        stages and exits on the next check. Completed or already-cancelled runs return
        404.
      parameters:
      - description: Run ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cancel a running AI suggestion run (admin)
      tags:
      - admin
      - jobs
    get:
      description: Returns the run metadata plus every pipeline event. Admin can view
        any user's run.
      parameters:
      - description: Run ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              events:
                items:
                  $ref: '#/definitions/internal_api_handlers.EventView'
                type: array
              run:
                $ref: '#/definitions/internal_api_handlers.RunView'
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get any AI suggestion run (admin)
      tags:
      - admin
      - jobs
  /admin/jobs/history:
    delete:
      parameters:
      - description: restrict to one kind
        in: query
        name: kind
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              deleted:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Clear finished job history
      tags:
      - admin
      - jobs
    get:
      description: Returns jobs across every kind in a single paginated list.
      parameters:
      - description: filter by kind
        in: query
        name: kind
        type: string
      - description: filter by status
        in: query
        name: status
        type: string
      - description: RFC3339 or NNd
        in: query
        name: since
        type: string
      - description: default 50, max 500
        in: query
        name: limit
        type: integer
      - description: 0-based
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  $ref: '#/definitions/internal_api_handlers.JobView'
                type: array
              total:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: List unified job history
      tags:
      - admin
      - jobs
  /admin/jobs/schedules:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handlers.ScheduleView'
            type: array
      security:
      - BearerAuth: []
      summary: List job schedules
      tags:
      - admin
      - jobs
  /admin/jobs/schedules/{kind}:
    put:
      consumes:
      - application/json
      parameters:
      - description: job kind
        in: path
        name: kind
        required: true
        type: string
      - description: schedule
        in: body
        name: body
        required: true
        schema:
          properties:
            config:
              type: object
            cron:
              type: string
            enabled:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handlers.ScheduleView'
      security:
      - BearerAuth: []
      summary: Upsert a job schedule
      tags:
      - admin
      - jobs
  /admin/jobs/schedules/{kind}/run:
    post:
      description: |-
        Fires the kind's Enqueue hook immediately, bypassing the
        cron. Creates an umbrella jobs row with triggered_by=admin
        so the run shows up in history as admin-triggered.
      parameters:
      - description: job kind
        in: path
        name: kind
        required: true
        type: string
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api_handlers.JobView'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Run a scheduled job once, now
      tags:
      - admin
      - jobs
  /admin/providers:
    get:
      description: Returns the status and configuration of all registered metadata
        providers.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.ProviderStatus'
            type: array
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List metadata providers (admin)
      tags:
      - admin
      - providers
  /admin/providers/{name}:
    put:
      consumes:
      - application/json
      description: Updates the API key or settings for the named provider.
      parameters:
      - description: Provider name
        in: path
        name: name
        required: true
        type: string
      - description: Provider configuration key-value pairs
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_fireball1725_librarium-api_internal_service.ProviderStatus'
            type: array
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Configure a metadata provider (admin)
      tags:
      - admin
      - providers
  /admin/providers/{name}/test:
    post:
      description: Performs a live test lookup to verify provider credentials are
        working.
      parameters:
      - description: Provider name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              ok:
                type: boolean
              title:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Test a metadata provider (admin)
      tags:
      - admin
      - providers
  /admin/providers/order:
    get:
      description: Returns the ordered list of provider names used when merging results.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              order:
                items:
                  type: string
                type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get provider priority order (admin)
      tags:
      - admin
      - providers
    put:
      consumes:
      - application/json
      description: Sets the ordered list of provider names used when merging results.
      parameters:
      - description: Ordered provider names
        in: body
        name: body
        required: true
        schema:
          properties:
            order:
              items:
                type: string
              type: array
          type: object
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set provider priority order (admin)
      tags:
      - admin
      - providers
  /admin/users:
    get:
      description: Returns a paginated list of all instance users. Instance admin
        only.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  type: object
                type: array
              page:
                type: integer
              per_page:
                type: integer
              total:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
