# Copy to 30-secret.yaml, fill in values, and apply. DO NOT commit the filled-in
# copy. For production, use sealed-secrets, External Secrets Operator, SOPS,
# or a real secret manager (Vault, cloud KMS) instead of plain Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: librarium-secrets
  namespace: librarium
type: Opaque
stringData:
  # Long random string used to sign JWTs. Generate with:
  #   openssl rand -base64 48
  JWT_SECRET: "REPLACE_ME"

  # Postgres connection string the api uses. The api reads DATABASE_URL
  # directly — password goes here so nothing has to interpolate across YAMLs.
  #
  # Bundled Postgres (10-postgres.yaml) — replace REPLACE_ME with the password:
  DATABASE_URL: "postgres://librarium:REPLACE_ME@librarium-db:5432/librarium?sslmode=disable"
  #
  # External / managed Postgres instead — comment out the line above and use:
  # DATABASE_URL: "postgres://user:pass@db.example.com:5432/librarium?sslmode=require"

  # Only needed if you're running the bundled Postgres StatefulSet (10-postgres.yaml).
  # Must match the password embedded in DATABASE_URL above.
  POSTGRES_PASSWORD: "REPLACE_ME"
