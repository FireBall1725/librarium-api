name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto    # next revision in current YY.MM (rolls to .0 on month change)
          - major   # force YY.MM.0 from today's date
      dry-run:
        description: "Compute the version but don't tag or push"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          YY=$(date -u +%y)
          MM=$(date -u +%-m)
          PREFIX="${YY}.${MM}"

          if [ "$BUMP" = "major" ]; then
            REV=0
          else
            LAST=$(git tag --list "v${PREFIX}.*" | sort -V | tail -n1 || true)
            if [ -z "$LAST" ]; then
              REV=0
            else
              LAST_REV=${LAST##*.}
              REV=$((LAST_REV + 1))
            fi
          fi

          VERSION="${PREFIX}.${REV}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # The version lives only in the git tag. version.go has no hardcoded
      # string — dev builds compute "{YY}.{M}.DEV" at startup, and publish.yml
      # injects the tagged version into release images via ldflags.
      - name: Tag release
        if: ${{ inputs.dry-run == false }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
